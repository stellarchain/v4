server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location ~ ^/(assets|asset|account|accounts|address|contracts|contract|ledger|ledgers|tx|transaction|transactions|operations|effects|markets|projects|price|charts|analytics|graph|liquidity-pool)/ {
    try_files $uri $uri.html /$1.html /index.html;
  }

  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }

  location /_next/ {
    add_header Cache-Control 'public, max-age=31536000, immutable';
    try_files $uri =404;
  }
}
